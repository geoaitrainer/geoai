<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ოფლაინ — AI ტრენერი</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: #0f1117; color: #e5e7eb;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      text-align: center; padding: 24px;
    }
    .box { max-width: 340px; }
    .logo {
      width: 72px; height: 72px; margin: 0 auto 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, #22c55e, #15803d);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    h1 { font-size: 20px; margin-bottom: 10px; }
    p { font-size: 14px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #22c55e; color: #fff; border: 0;
      padding: 12px 28px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">💪</div>
    <h1>ინტერნეტი არ არის</h1>
    <p>ვერ დაგიკავშირდით. შეამოწმე ქსელი და სცადე ხელახლა — შენი გეგმები დაგელოდება.</p>
    <button onclick="location.reload()">ხელახლა ცდა</button>
  </div>
</body>
</html>
